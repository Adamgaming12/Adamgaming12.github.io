 <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Link Navigator</title>
  <style>
    /* Centers the entire layout on the screen */
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background-color: #0f172a; /* Sleek dark background */
      font-family: 'Segoe UI', Roboto, sans-serif;
    }

    /* Arranges the links into a 2x2 grid */
    .link-container {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 25px; 
      padding: 20px;
    }

    /* Styles the anchor tags to look and behave like buttons */
    .button-link {
      width: 180px;
      height: 70px;
      background: linear-gradient(135deg, #3b82f6, #1d4ed8); /* Blue gradient */
      color: white;
      font-size: 18px;
      font-weight: 600;
      text-decoration: none; /* Removes the default underline */
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(29, 78, 216, 0.3);
      
      /* Centers the text inside the button */
      display: flex;
      justify-content: center;
      align-items: center;
      
      /* Smooth hover transition */
      transition: all 0.2s ease-in-out;
    }

    /* Hover effect: Lifts button and brightens the color */
    .button-link:hover {
      transform: translateY(-3px);
      background: linear-gradient(135deg, #60a5fa, #2563eb);
      box-shadow: 0 8px 20px rgba(37, 99, 235, 0.4);
    }

    /* Click effect */
    .button-link:active {
      transform: translateY(-1px);
    }
  </style>
</head>
<body>

  <div class="link-container">
    <a href="https://adamgaming12.github.io/sprunki" target="_blank" class="button-link">Sprunki</a>
    <a href="https://adamgaming12.github.io/cheeserolling" target="_blank" class="button-link">Cheese Rolling</a>
    <a href="https://adamgaming12.github.io/minecraft" target="_blank" class="button-link">minecraft</a>
  </div>

</body>
</html>
